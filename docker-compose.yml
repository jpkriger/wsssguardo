services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wssdb
      POSTGRES_USER: wss
      POSTGRES_PASSWORD: wss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wss -d wssdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/wssdb
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: wss
      DB_PASSWORD: wss
      DB_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      OTLP_ENABLED: "false"
      SECURITY_AUTH_DISABLED: "true"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
