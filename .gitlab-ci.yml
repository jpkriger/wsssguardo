stages:
  - test

backend:
  stage: test
  image: eclipse-temurin:25-jdk
  variables:
    SPRING_PROFILES_ACTIVE: dev
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .m2/repository
  before_script:
    - cd backend
    - chmod +x mvnw
  script:
    - ./mvnw --batch-mode --no-transfer-progress -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository clean verify

frontend:
  stage: test
  image: oven/bun:1
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
  script:
    - |
      if [ -f bun.lock ] || [ -f bun.lockb ]; then
        bun install --frozen-lockfile
      else
        bun install
      fi
    - |
      if grep -q '"test"\s*:' package.json; then
        bun run test
      else
        echo "Skipping tests: no test script found in package.json"
      fi
    - bun run build
    - |
      if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ]; then
        bun run lint
      else
        echo "Skipping lint: no eslint.config.(js|mjs|cjs) found"
      fi