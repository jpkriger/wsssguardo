stages:
  - test

backend:
  stage: test
  image: eclipse-temurin:25-jdk
  variables:
    SPRING_PROFILES_ACTIVE: dev
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .m2/repository
  before_script:
    - cd backend
    - chmod +x mvnw
  script:
    - ./mvnw --batch-mode --no-transfer-progress -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository clean verify

frontend:
  stage: test
  image: oven/bun:1
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
  script:
    - |
      if [ -f bun.lock ] || [ -f bun.lockb ]; then
        bun install --frozen-lockfile
      else
        bun install
      fi
    - bun run lint
    - bun run test
    - bun run build
